apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 4 
  strategy:
    type: RollingUpdate
    rollingupdate:
      maxUnavailable: 25%
      maxSurge: 25%   ##for example consider it as extra pod so,total 5 pods can be available with reference to replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: httpd
        ports:
        - containerPort: 80 